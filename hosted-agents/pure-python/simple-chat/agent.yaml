name: simple-chat
description: Pure Python agent - no framework, just OpenAI SDK + Starlette HTTP server.
metadata:
  example:
    - role: user
      content: "Hello, what can you help me with?"
  tags:
    - example
    - learning
    - pure-python
template:
  name: SimpleChatAgent
  kind: hosted
  protocols:
    - protocol: responses
      version: v1
  environment_variables:
    - name: AZURE_OPENAI_ENDPOINT
      value: ${AZURE_OPENAI_ENDPOINT}
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{chat}}"
resources:
  - kind: model
    id: gpt-4.1
    name: chat
